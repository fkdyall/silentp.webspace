name: Capture packaging diagnostics

# One-time collector. It records the command output and is intentionally non-failing.
# Verification pass: implicit publishing disabled and desktop metadata corrected.
on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/diagnostic-build.yml"

permissions:
  contents: write

jobs:
  capture-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install desktop dependencies
        working-directory: desktop
        run: npm install
      - name: Capture Linux check and packaging output
        shell: bash
        run: |
          mkdir -p diagnostics
          set +e
          (
            cd desktop
            npm run check
          ) > diagnostics/linux-check-output.txt 2>&1
          echo "$?" > diagnostics/linux-check-exit.txt
          (
            cd desktop
            npm run dist:linux
          ) > diagnostics/linux-build-output.txt 2>&1
          echo "$?" > diagnostics/linux-build-exit.txt
          exit 0
      - name: Commit captured logs without failing the workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add diagnostics
          if git diff --cached --quiet; then
            echo "No diagnostic changes to commit."
          else
            git commit -m "Capture Linux packaging diagnostic output"
            git push || true
          fi
          exit 0
