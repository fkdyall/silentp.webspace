name: Capture packaging diagnostics

# Manual-only diagnostic collector. No commits automatically run it.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  capture-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install desktop dependencies
        working-directory: desktop
        run: npm install
      - name: Capture Windows check and packaging output
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path diagnostics | Out-Null
          Push-Location desktop
          cmd /c "npm run check > ..\diagnostics\windows-check-output.txt 2>&1"
          $checkExit = $LASTEXITCODE
          Set-Content -Path ../diagnostics/windows-check-exit.txt -Value $checkExit
          cmd /c "npm run dist:win > ..\diagnostics\windows-build-output.txt 2>&1"
          $buildExit = $LASTEXITCODE
          Set-Content -Path ../diagnostics/windows-build-exit.txt -Value $buildExit
          Pop-Location
          exit 0
      - name: Commit captured output without failing the workflow
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add diagnostics
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "Capture Windows packaging diagnostic output"
            git push
          }
          exit 0
