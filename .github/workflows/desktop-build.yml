name: Build desktop packages

# Manual-only while the alpha architecture is still changing.
# This prevents every source commit from launching Linux and Windows builds.
on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            command: dist:linux
          - os: windows-latest
            command: dist:win
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run check
      - run: npm run ${{ matrix.command }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: silent-p-pwsa-${{ runner.os }}
          path: desktop/dist/*
          if-no-files-found: error
          retention-days: 14
