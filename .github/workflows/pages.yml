name: Publish interface preview

# Manual-only while the alpha interface is still changing.
# This prevents every web commit from launching a Pages deployment.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - name: Deploy interface preview
        id: deployment
        uses: actions/deploy-pages@v4
